<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpScale Lab - Acelerador de Startups</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: #667eea;
            font-size: 28px;
        }

        .auth-buttons {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .card p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: #667eea;
            margin: 0;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .close-btn:hover {
            color: #333;
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .dashboard {
            display: none;
        }

        .dashboard.show {
            display: block;
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .course-card {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .course-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            border-color: #667eea;
        }

        .course-card h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .course-card p {
            color: #666;
            font-size: 14px;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-approved {
            background: #d4edda;
            color: #155724;
        }

        .status-rejected {
            background: #f8d7da;
            color: #721c24;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            header h1 {
                font-size: 20px;
            }
        }

        .hero {
            background: white;
            padding: 60px 30px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .hero h2 {
            color: #667eea;
            font-size: 36px;
            margin-bottom: 20px;
        }

        .hero p {
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .hero-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-large {
            padding: 15px 40px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 UpScale Lab</h1>
            <div class="auth-buttons">
                <button id="loginBtn" class="btn-primary btn-large" onclick="showLoginModal()">Login</button>
                <button id="logoutBtn" class="btn-secondary" onclick="logout()" style="display: none;">Logout</button>
                <span id="userEmail" style="margin-left: 20px; display: none;"></span>
            </div>
        </header>

        <!-- Hero Section -->
        <div class="hero" id="heroSection">
            <h2>Bem-vindo ao UpScale Lab</h2>
            <p>Aceleramos startups inovadoras através de mentoria, recursos e validação de mercado.</p>
            <div class="hero-buttons">
                <button class="btn-primary btn-large" onclick="showApplicationModal()">🚀 Acelere Agora</button>
                <button class="btn-secondary btn-large" onclick="showCoursesModal()">📚 Explorar Cursos</button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content" id="mainContent" style="display: none;">
            <!-- Dashboard -->
            <div class="card dashboard" id="dashboard">
                <h2>📊 Seu Dashboard</h2>
                <div id="dashboardContent"></div>
            </div>

            <!-- Cursos -->
            <div class="card">
                <h2>📚 Cursos Disponíveis</h2>
                <div class="courses-grid" id="coursesGrid"></div>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Login</h2>
                <button class="close-btn" onclick="closeModal('loginModal')">&times;</button>
            </div>
            <div id="googleLoginDiv"></div>
        </div>
    </div>

    <!-- Application Modal -->
    <div class="modal" id="applicationModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Inscrição - UpScale Lab</h2>
                <button class="close-btn" onclick="closeModal('applicationModal')">&times;</button>
            </div>
            <div id="applicationAlert"></div>
            <form id="applicationForm" onsubmit="submitApplication(event)">
                <div class="form-group">
                    <label>Nome da Empresa *</label>
                    <input type="text" id="companyName" required>
                </div>
                <div class="form-group">
                    <label>Descrição do Negócio *</label>
                    <textarea id="description" required></textarea>
                </div>
                <div class="form-group">
                    <label>Estágio *</label>
                    <select id="stage" required>
                        <option value="">Selecione...</option>
                        <option value="idea">Ideia</option>
                        <option value="mvp">MVP</option>
                        <option value="traction">Tração</option>
                        <option value="growth">Crescimento</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Tamanho do Time</label>
                    <input type="number" id="teamSize" min="1">
                </div>
                <div class="form-group">
                    <label>Capital Levantado (R$)</label>
                    <input type="number" id="fundingRaised" min="0">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">Enviar Inscrição</button>
            </form>
        </div>
    </div>

    <!-- Courses Modal -->
    <div class="modal" id="coursesModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Cursos Disponíveis</h2>
                <button class="close-btn" onclick="closeModal('coursesModal')">&times;</button>
            </div>
            <div id="coursesContent"></div>
        </div>
    </div>

    <script>
        // State Management
        let currentUser = null;
        let applications = JSON.parse(localStorage.getItem('applications') || '[]');

        // Google OAuth Configuration
        window.onload = function() {
            google.accounts.id.initialize({
                client_id: '1083479129780-6sv9lu9gh6rdp46qov3i0381koipv140.apps.googleusercontent.com',
                callback: handleCredentialResponse
            });

            google.accounts.id.renderButton(
                document.getElementById('googleLoginDiv'),
                { theme: 'outline', size: 'large', width: '100%' }
            );

            // Check if user is logged in
            checkUserStatus();
            loadCourses();
        };

        function handleCredentialResponse(response) {
            // Decode JWT token
            const base64Url = response.credential.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));

            const userData = JSON.parse(jsonPayload);
            currentUser = {
                email: userData.email,
                name: userData.name,
                picture: userData.picture
            };

            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            closeModal('loginModal');
            updateUI();
        }

        function checkUserStatus() {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                updateUI();
            }
        }

        function updateUI() {
            const loginBtn = document.getElementById('loginBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const userEmail = document.getElementById('userEmail');
            const heroSection = document.getElementById('heroSection');
            const mainContent = document.getElementById('mainContent');

            if (currentUser) {
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'inline-block';
                userEmail.style.display = 'inline-block';
                userEmail.textContent = `👤 ${currentUser.name}`;
                heroSection.style.display = 'none';
                mainContent.style.display = 'grid';
                loadDashboard();
            } else {
                loginBtn.style.display = 'inline-block';
                logoutBtn.style.display = 'none';
                userEmail.style.display = 'none';
                heroSection.style.display = 'block';
                mainContent.style.display = 'none';
            }
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            updateUI();
        }

        function showLoginModal() {
            document.getElementById('loginModal').classList.add('show');
        }

        function showApplicationModal() {
            if (!currentUser) {
                showLoginModal();
                return;
            }
            document.getElementById('applicationModal').classList.add('show');
        }

        function showCoursesModal() {
            document.getElementById('coursesModal').classList.add('show');
            loadCoursesModal();
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
        }

        function submitApplication(event) {
            event.preventDefault();

            const application = {
                id: Date.now(),
                email: currentUser.email,
                companyName: document.getElementById('companyName').value,
                description: document.getElementById('description').value,
                stage: document.getElementById('stage').value,
                teamSize: document.getElementById('teamSize').value || 0,
                fundingRaised: document.getElementById('fundingRaised').value || 0,
                status: 'pending',
                createdAt: new Date().toISOString()
            };

            applications.push(application);
            localStorage.setItem('applications', JSON.stringify(applications));

            showAlert('applicationAlert', 'Inscrição enviada com sucesso! Aguarde validação.', 'success');
            document.getElementById('applicationForm').reset();

            setTimeout(() => {
                closeModal('applicationModal');
                loadDashboard();
            }, 2000);
        }

        function loadDashboard() {
            const userApplications = applications.filter(app => app.email === currentUser.email);
            const dashboardContent = document.getElementById('dashboardContent');

            if (userApplications.length === 0) {
                dashboardContent.innerHTML = `
                    <p>Você ainda não tem inscrições. <a href="#" onclick="showApplicationModal(); return false;">Inscreva-se agora!</a></p>
                `;
                return;
            }

            let html = '<h3>Suas Inscrições</h3>';
            userApplications.forEach(app => {
                const statusClass = `status-${app.status}`;
                html += `
                    <div style="margin-top: 15px; padding: 15px; background: #f9f9f9; border-radius: 5px;">
                        <strong>${app.companyName}</strong>
                        <span class="status-badge ${statusClass}">${app.status.toUpperCase()}</span>
                        <p style="margin-top: 10px; color: #666; font-size: 14px;">${app.description}</p>
                        <small>Enviado em: ${new Date(app.createdAt).toLocaleDateString('pt-BR')}</small>
                    </div>
                `;
            });

            dashboardContent.innerHTML = html;
        }

        function loadCourses() {
            const courses = [
                { id: 1, title: 'Ignite Up - Módulo 1', description: 'Fundamentos de Startups', modules: 5 },
                { id: 2, title: 'Ignite Up - Módulo 2', description: 'Produto e Mercado', modules: 4 },
                { id: 3, title: 'Ignite Up - Módulo 3', description: 'Financiamento', modules: 6 },
                { id: 4, title: 'Ignite Up - Módulo 4', description: 'Crescimento e Escala', modules: 5 }
            ];

            const coursesGrid = document.getElementById('coursesGrid');
            coursesGrid.innerHTML = courses.map(course => `
                <div class="course-card" onclick="alert('Curso: ${course.title}\\n${course.modules} aulas disponíveis')">
                    <h3>${course.title}</h3>
                    <p>${course.description}</p>
                    <p style="margin-top: 10px;"><strong>${course.modules} aulas</strong></p>
                </div>
            `).join('');
        }

        function loadCoursesModal() {
            const coursesContent = document.getElementById('coursesContent');
            const courses = [
                { id: 1, title: 'Ignite Up - Módulo 1', description: 'Fundamentos de Startups', modules: 5 },
                { id: 2, title: 'Ignite Up - Módulo 2', description: 'Produto e Mercado', modules: 4 },
                { id: 3, title: 'Ignite Up - Módulo 3', description: 'Financiamento', modules: 6 },
                { id: 4, title: 'Ignite Up - Módulo 4', description: 'Crescimento e Escala', modules: 5 }
            ];

            coursesContent.innerHTML = courses.map(course => `
                <div class="course-card" style="margin-bottom: 15px;">
                    <h3>${course.title}</h3>
                    <p>${course.description}</p>
                    <p><strong>${course.modules} aulas</strong></p>
                    <button class="btn-primary" style="width: 100%; margin-top: 10px;">Acessar Curso</button>
                </div>
            `).join('');
        }

        function showAlert(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modals = document.querySelectorAll('.modal');
            modals.forEach(modal => {
                if (event.target === modal) {
                    modal.classList.remove('show');
                }
            });
        }
    </script>
</body>
</html>
